* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--fg); }
header { padding: 12px 18px; border-bottom: 1px solid var(--border); background: var(--panel); display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
header h1 { margin: 0; font-size: 16px; font-weight: 600; }
header h1 .sub { color: var(--muted); font-weight: 400; }
.stats { color: var(--muted); font-size: 12px; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
.controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.controls input[type=search] { padding: 5px 9px; border: 1px solid var(--border); border-radius: 5px; font-size: 13px; min-width: 200px; font-family: inherit; }
.controls input[type=search]:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(37,99,235,0.18); }
.controls label { font-size: 12.5px; color: var(--muted); display: inline-flex; align-items: center; gap: 4px; cursor: pointer; user-select: none; }

#cy { position: absolute; top: 53px; left: 0; right: 320px; bottom: 0; background: var(--bg); }
#side { position: absolute; top: 53px; right: 0; width: 320px; bottom: 0; border-left: 1px solid var(--border); background: var(--panel); overflow: auto; padding: 16px 18px; font-size: 13px; }
#side h2 { font-size: 14px; margin: 0 0 8px; font-weight: 600; }
#side .placeholder { color: var(--muted); font-style: italic; font-size: 12.5px; }
#side .et { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-weight: 600; font-size: 13px; word-break: break-all; }
#side .title { color: var(--muted); font-size: 12.5px; margin: 4px 0 12px; }
#side .row { font-size: 12.5px; margin: 4px 0; }
#side .row label { color: var(--muted); display: inline-block; min-width: 84px; }
#side .row span { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
#side a { color: var(--accent); text-decoration: none; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 12px; word-break: break-all; }
#side a:hover { text-decoration: underline; }
#side ul.refs { list-style: none; padding: 0; margin: 6px 0 0; }
#side ul.refs li { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 12px; padding: 2px 0; color: var(--fg); cursor: pointer; }
#side ul.refs li:hover { color: var(--accent); }
#side ul.refs li .kind { color: var(--muted); font-size: 10.5px; margin-left: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
.legend { display: flex; gap: 14px; align-items: center; font-size: 11.5px; color: var(--muted); }
.legend .item { display: inline-flex; gap: 5px; align-items: center; }
.legend .swatch { width: 14px; height: 3px; border-radius: 2px; display: inline-block; }
.legend .swatch.node { height: 10px; width: 10px; border-radius: 50%; }
</style>

<script type="application/json" id="passport">{"$id": "https://common.lr-west.ru/schemas/registry/schema.json", "corpus": "common_schema", "version": "0.1.0", "description": "Паспорт канонического корпуса common_schema — источник правды о составе и идентичности корпуса. Авторский статический документ: добавление сущности на диск без её регистрации здесь — недопустимо; запись здесь без файла на диске — недопустимо.", "methodology": "https://common.lr-west.ru/schemas/docs/methodology.html", "contract": {"meta": "https://common.lr-west.ru/schemas/registry/meta.json", "common": "https://common.lr-west.ru/schemas/registry/common.json", "entity": "https://common.lr-west.ru/schemas/registry/entity/{entity_type}.json"}, "entities": ["calendar_item", "calendar_meeting", "car", "car_engine", "car_history", "car_lift", "car_model", "car_model_group", "car_to_operation", "car_to_table", "car_to_table/item", "cash_operation", "cash_operation/item", "cash_operation_article", "cash_operation_project", "cash_operation_type", "charge_retention", "circle", "company", "contact", "country", "department", "director_audit", "director_audit/complaint", "director_audit/gratitude", "director_audit/history", "discount_card", "document_media", "document_post", "economic_operation", "education_course", "education_course/completion", "education_course_category", "employee", "employee_attendance", "employee_charge", "employee_timesheet", "feed_event", "feed_tag", "function", "group", "income_expense_article", "job", "location", "manufacturer", "meeting_room", "notification", "organization", "partner", "person", "pricelist", "pricelist/car_model", "pricelist/job", "pricelist/product", "pricelist/tag", "problem_reason", "product", "product_category", "product_order", "product_order/product", "product_type", "project_category", "project_category_stage", "project_folder", "project_issue", "project_project", "project_task", "project_topic", "quality_check", "quality_check/indicator", "quality_indicator", "realm", "result_dashboard", "role", "schedule", "schedule/item", "tag", "thread", "uom", "user", "warehouse", "work_order", "work_order/executor", "work_order/job", "work_order/product", "work_order_client_review", "work_order_client_review/complaint", "work_order_client_review/gratitude", "work_order_type", "work_shift", "work_shift/interval", "work_shift_interval_type"]}</script>

<script src="https://unpkg.com/cytoscape@3.27.0/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/layout-base@2.0.1/layout-base.js"></script>
<script src="https://unpkg.com/cose-base@2.2.0/cose-base.js"></script>
<script src="https://unpkg.com/cytoscape-cose-bilkent@4.1.0/cytoscape-cose-bilkent.js"></script>
<script>
const GRAPH = JSON.parse(document.getElementById('graph').textContent);
const PASSPORT = JSON.parse(document.getElementById('passport').textContent);

const KIND_COLOR = {
  owner: '#2563eb', involved: '#0e7490', parent: '#7c3aed', peer: '#94a3b8', contains: '#059669',
};
const AUD_COLOR = {
  public: '#dcfce7', contextual: '#fef3c7', embedded: '#e5e7eb', host: '#ddd6fe',
};

const cy = cytoscape({
  container: document.getElementById('cy'),
  elements: { nodes: GRAPH.nodes, edges: GRAPH.edges },
  wheelSensitivity: 0.2,
  style: [
    {
      selector: 'node',
      style: {
        'background-color': ele => AUD_COLOR[ele.data('audience')] || '#f3f4f6',
        'border-color': '#9ca3af',
        'border-width': 1,
        'label': 'data(label)',
        'font-size': 10,
        'font-family': 'ui-monospace, SFMono-Regular, Consolas, monospace',
        'color': '#1a1a1a',
        'text-valign': 'center',
        'text-halign': 'center',
        'width': 'label',
        'height': 'label',
        'padding': '7px',
        'shape': 'round-rectangle',
        'text-wrap': 'wrap',
        'text-max-width': '180px',
      }
    },
    {
      selector: 'node[?embedded]',
      style: { 'font-size': 8.5, 'opacity': 0.85, 'border-style': 'dashed' }
    },
    {
      selector: 'node:parent',
      style: {
        'background-opacity': 0.05,
        'background-color': '#6b7280',
        'border-width': 1,
        'border-style': 'dotted',
        'label': 'data(label)',
        'text-valign': 'top',
        'text-halign': 'center',
        'font-size': 11,
        'color': '#6b7280',
        'padding': '20px',
      }
    },
    {
      selector: 'node:selected',
      style: { 'border-color': '#2563eb', 'border-width': 2 }
    },
    {
      selector: 'edge',
      style: {
        'width': 1,
        'curve-style': 'bezier',
        'target-arrow-shape': 'triangle',
        'target-arrow-color': ele => KIND_COLOR[ele.data('kind')] || '#9ca3af',
        'line-color': ele => KIND_COLOR[ele.data('kind')] || '#9ca3af',
        'opacity': 0.55,
        'arrow-scale': 0.8,
      }
    },
    {
      selector: 'edge[kind = "peer"]',
      style: { 'line-style': 'dotted', 'opacity': 0.4 }
    },
    {
      selector: 'edge[kind = "contains"]',
      style: { 'width': 2, 'opacity': 0.7, 'target-arrow-shape': 'diamond' }
    },
    {
      selector: 'edge:selected',
      style: { 'width': 3, 'opacity': 1 }
    },
    {
      selector: '.faded',
      style: { 'opacity': 0.08, 'text-opacity': 0.15 }
    },
    {
      selector: '.highlight',
      style: { 'opacity': 1, 'text-opacity': 1, 'width': 2 }
    },
  ],
  layout: {
    name: 'cose-bilkent',
    nodeDimensionsIncludeLabels: true,
    idealEdgeLength: 110,
    edgeElasticity: 0.45,
    nodeRepulsion: 7000,
    gravity: 0.25,
    randomize: true,
    fit: true,
    padding: 30,
    animate: false,
    quality: 'default',
  }
});

function updateStats() {
  const n = cy.nodes(':visible').length;
  const e = cy.edges(':visible').length;
  document.getElementById('stats').textContent =
    `${PASSPORT.corpus} · ${PASSPORT.version} · показано ${n}/${cy.nodes().length} сущностей, ${e}/${cy.edges().length} связей`;
}

function fillSide(node) {
  const d = node.data();
  const incoming = node.incomers('edge').map(e => ({
    other: e.source().id(), field: e.data('field'), kind: e.data('kind'), dir: 'in'
  }));
  const outgoing = node.outgoers('edge').map(e => ({
    other: e.target().id(), field: e.data('field'), kind: e.data('kind'), dir: 'out'
  }));
  const refRow = r => `<li data-id="${r.other}">${r.dir === 'out' ? '→' : '←'} ${r.other}` +
    `<span class="kind">${r.field} · ${r.kind}</span></li>`;
  document.getElementById('side').innerHTML = `
    <h2><span class="et">${d.id}</span></h2>
    <div class="title">${d.title || ''}</div>
    <div class="row"><label>audience</label><span>${d.audience ?? '—'}</span></div>
    <div class="row"><label>fields</label><span>${d.fields}</span></div>
    <div class="row"><label>url</label><a href="${d.url}" target="_blank" rel="noopener">${d.url}</a></div>
    ${outgoing.length ? `<h2 style="margin-top:18px">исходящие (${outgoing.length})</h2><ul class="refs">${outgoing.map(refRow).join('')}</ul>` : ''}
    ${incoming.length ? `<h2 style="margin-top:18px">входящие (${incoming.length})</h2><ul class="refs">${incoming.map(refRow).join('')}</ul>` : ''}
  `;
  document.querySelectorAll('#side ul.refs li').forEach(li => {
    li.addEventListener('click', () => {
      const target = cy.getElementById(li.dataset.id);
      if (target.nonempty()) {
        cy.elements().unselect();
        target.select();
        cy.animate({ center: { eles: target }, zoom: Math.max(cy.zoom(), 1) }, { duration: 250 });
      }
    });
  });
}

cy.on('tap', 'node', evt => {
  const n = evt.target;
  cy.elements().removeClass('faded highlight');
  const nbrs = n.closedNeighborhood();
  cy.elements().not(nbrs).addClass('faded');
  nbrs.addClass('highlight');
  fillSide(n);
});

cy.on('tap', evt => {
  if (evt.target === cy) {
    cy.elements().removeClass('faded highlight');
    document.getElementById('side').innerHTML = '<div class="placeholder">кликни узел для деталей</div>';
  }
});

function applyFilters() {
  const q = document.getElementById('filter').value.trim().toLowerCase();
  const hidePeer = document.getElementById('hide-peer').checked;
  const hideEmbedded = document.getElementById('hide-embedded').checked;
  cy.batch(() => {
    cy.nodes().forEach(n => {
      const matchesQ = !q || n.data('id').toLowerCase().includes(q) || (n.data('title') || '').toLowerCase().includes(q);
      const matchesEmbedded = !hideEmbedded || !n.data('embedded');
      n.style('display', (matchesQ && matchesEmbedded) ? 'element' : 'none');
    });
    cy.edges().forEach(e => {
      const peerHidden = hidePeer && e.data('kind') === 'peer';
      const endpointHidden = e.source().style('display') === 'none' || e.target().style('display') === 'none';
      e.style('display', (peerHidden || endpointHidden) ? 'none' : 'element');
    });
  });
  updateStats();
}

document.getElementById('filter').addEventListener('input', applyFilters);
document.getElementById('hide-peer').addEventListener('change', applyFilters);
document.getElementById('hide-embedded').addEventListener('change', applyFilters);
document.getElementById('relayout').addEventListener('click', () => {
  cy.layout({ name: 'cose-bilkent', nodeDimensionsIncludeLabels: true, randomize: false, animate: 'end', fit: true, padding: 30 }).run();
});

updateStats();
</script>
</body>
</html>
